name: Make GHCR package public

# Torna o pacote de container público, para o Swarm puxar sem auth.
# Rodar manualmente (workflow_dispatch) após o primeiro build.
on:
  workflow_dispatch:

jobs:
  make-public:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/nexusai360/packages/container/painel-celula \
            -f visibility=public && echo "OK: público" || echo "Falhou (ver permissões do pacote)"
